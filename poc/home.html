<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPU Diagnostics</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3d;
      --text: #e2e8f0;
      --muted: #64748b;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .btn-login {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 22px;
      border-radius: 7px;
      font-size: 0.88rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-login:hover { border-color: var(--blue); color: var(--blue); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.6;
    }

    footer {
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">
      <div class="nav-logo-icon">⚡</div>
      GPU Diagnostics
    </a>
    <a class="btn-login" href="/login">Log in</a>
  </nav>

  <main>
    <h1>GPU Diagnostics</h1>
    <p>Real-time health scoring, tier classification, and workload routing for GPU fleets.</p>
  </main>

  <footer>GPU Diagnostic POC</footer>
</body>
</html>
