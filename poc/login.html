<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPU Diagnostic — Login</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3d;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 1.15rem; font-weight: 600; }
    .logo .sub { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--blue); }

    button {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      color: var(--red);
      font-size: 0.83rem;
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    .test-creds {
      margin-top: 28px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .test-creds .heading {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .cred-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      margin-bottom: 8px;
      font-size: 0.83rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .cred-row:hover { border-color: var(--blue); }
    .cred-row .cred-user { font-weight: 600; }
    .cred-row .cred-pass { color: var(--muted); font-family: monospace; }
    .cred-row .cred-hint { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .fill-hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="h1">GPU Diagnostic</div>
      <div class="sub">Health Scoring & Fleet Monitor</div>
    </div>
  </div>

  <form id="login-form" onsubmit="doLogin(event)">
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="username" autocomplete="username" required />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="password" autocomplete="current-password" required />

    <button id="submit-btn" type="submit">Sign In</button>
    <div class="error" id="error-msg">Invalid username or password.</div>
  </form>

  <div class="test-creds">
    <div class="heading">Test credentials — click to fill</div>
    <div class="cred-row" onclick="fillCreds('demo','gpu-diag-2024')">
      <div>
        <div class="cred-user">demo</div>
        <div class="cred-hint">Read-only demo access</div>
      </div>
      <div class="cred-pass">gpu-diag-2024</div>
    </div>
    <div class="cred-row" onclick="fillCreds('admin','admin123')">
      <div>
        <div class="cred-user">admin</div>
        <div class="cred-hint">Full access</div>
      </div>
      <div class="cred-pass">admin123</div>
    </div>
    <div class="fill-hint">Click a row to auto-fill</div>
  </div>
</div>

<script>
  // If already logged in, skip login page
  if (localStorage.getItem('gpu_token')) {
    window.location.href = '/dashboard';
  }

  function fillCreds(user, pass) {
    document.getElementById('username').value = user;
    document.getElementById('password').value = pass;
    document.getElementById('username').focus();
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const r = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        })
      });
      if (r.ok) {
        const data = await r.json();
        localStorage.setItem('gpu_token', data.token);
        window.location.href = '/dashboard';
      } else {
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (_) {
      err.textContent = 'Server unreachable — is the API running?';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
